name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # Build runs `pnpm generate:types` via the `prebuild` hook, which
      # regenerates `src/cli/lib/generated-types.ts` from the schema. If
      # the regenerated file differs from the committed one, fail the
      # build — PRs must regenerate when they change the schema (#39).
      - run: pnpm build
      - name: Type-generation drift check
        run: |
          if ! git diff --quiet src/cli/lib/generated-types.ts; then
            echo "::error::generated-types.ts is out of sync with the schema."
            echo "Run \`pnpm generate:types\` locally and commit the result."
            git --no-pager diff src/cli/lib/generated-types.ts | head -200
            exit 1
          fi
      - run: pnpm test

  connectivity:
    name: URL Connectivity Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:connectivity